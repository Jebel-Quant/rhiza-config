name: Book

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: book-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build on every push/PR so each commit proves the book still builds. The
  # artifact is only ever consumed by the deploy job below.
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build the book
        run: uvx --with mkdocs-material mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _book

  # Publish to GitHub Pages only from the default branch (never from a PR).
  deploy:
    name: deploy
    needs: build
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
