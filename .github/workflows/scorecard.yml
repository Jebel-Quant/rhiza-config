name: Scorecard

# OpenSSF Scorecard supply-chain security analysis. Uploads SARIF to code
# scanning and (on public repos) publishes to the OpenSSF REST API, which
# powers the README badge. Auto-enables on public repos; set the
# SCORECARD_ENABLED repo variable to 'true'/'false' to override.

on:
  branch_protection_rule:
  schedule:
    - cron: '34 2 * * 2'
  push:
    branches: [main]
  workflow_dispatch:

# Top level stays read-only: the OpenSSF publish step rejects results when
# id-token/security-events write scopes are granted workflow-wide, so those
# live only on the job below.
permissions:
  contents: read
  actions: read

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    if: |
      vars.SCORECARD_ENABLED == 'true' ||
      (vars.SCORECARD_ENABLED != 'false' && github.event.repository.visibility == 'public')
    permissions:
      security-events: write   # upload the SARIF results to code scanning
      id-token: write          # publish results to the OpenSSF REST API (badge)
      contents: read
      actions: read
    steps:
      - name: Harden the runner (audit outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard results artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
